<h1 class="text-center text-2xl py-4">REGISTRO DE  STANDS PARA PUBLICACIONES</h1>

<form [formGroup]="standForm" (ngSubmit)="onSubmit()" class="p-6 bg-green-900 rounded-xl text-green-100 space-y-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

    <!-- Tipo -->
    <div>
      <label class="block mb-1">Tipo *</label>
      <input formControlName="type" type="text"
             class="w-full p-2 rounded bg-green-800 border border-green-700" />
      <div *ngIf="standForm.get('type')?.touched && standForm.get('type')?.invalid"
           class="text-red-400 text-sm">Campo obligatorio</div>
    </div>

    <!-- Estado -->
    <div>
      <label class="block mb-1">Estado *</label>
      <input formControlName="status" type="text"
             class="w-full p-2 rounded bg-green-800 border border-green-700" />
      <div *ngIf="standForm.get('status')?.touched && standForm.get('status')?.invalid"
           class="text-red-400 text-sm">Campo obligatorio</div>
    </div>

    <!-- Observaciones -->
    <div class="md:col-span-2">
      <label class="block mb-1">Observaciones</label>
      <textarea formControlName="observations"
                class="w-full p-2 rounded bg-green-800 border border-green-700"
                rows="2"></textarea>
    </div>

    <!-- Póster -->
    <div class="md:col-span-2">
      <label class="block mb-1">Póster (URL)</label>
      <input formControlName="poster" type="text"
             class="w-full p-2 rounded bg-green-800 border border-green-700" />
    </div>

    <!-- Habilitado -->
    <div class="md:col-span-2 flex items-center gap-2">
      <input type="checkbox" formControlName="enable"
             class="accent-green-700 rounded" />
      <label class="block">¿Habilitado?</label>
    </div>

    <!-- Congregación -->
    <div class="md:col-span-2">
      <label class="block mb-1">Congregación *</label>
      <select formControlName="congregation" class="w-full p-2 rounded bg-green-800 border border-green-700">
        <option value="">Seleccione una congregación</option>
        <option *ngFor="let c of congregations" [value]="c.id">{{ c.name }}</option>
      </select>
      <div *ngIf="standForm.get('congregation')?.touched && standForm.get('congregation')?.invalid"
           class="text-red-400 text-sm">Seleccione una congregación</div>
    </div>

  </div>

  <!-- Botón de enviar -->
  <div class="mt-6">
    <button type="submit" class="px-6 py-2 bg-green-700 hover:bg-green-600 rounded text-white">Guardar</button>
  </div>
</form>
