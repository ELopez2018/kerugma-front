<h1 class="text-center text-xl mb-4 md:text-4xl font-bold uppercase text-shadow-2xs">
  Bienvenido al sistema para la Predicacion Pública
</h1>
<h2 class="text-center md:text-3xl font-bold mb-4 text-shadow-2xs">¿QUE DESEAS HACER HOY?</h2>

<div class="md:flex space-x-10">
  <div class=" w-full font-bold mb-4 h-23 z-30 shadow_1 items-center content-center md:w-1/3 md:h-auto md:text-3xl hover:cursor-pointer "  *ngFor="let item of items" (click)="goTo(item.path)">
    <div class="flex items-center md:grid content-center md:justify-items-center md:h-full md:content-end md:p-5 " >
      <img class="w-20  me-4 md:w-1/2 " src="{{item.img}}" alt=""  />
     <div class="md:py-4">{{item.title}}</div>
    </div>
  </div>
</div>
