<h1 class="text-center text-2xl pb-5 text-shadow-2xs text-white">ELIMINAR USUARIO</h1>
  <div
    class="bg-green-900 text-white rounded-xl shadow-lg w-80 p-6 border border-green-700"
  >
    <h2 class="text-lg font-semibold mb-3 text-center">
      Confirmar eliminación
    </h2>

    <p class="text-sm text-center mb-6">
      ¿Seguro que deseas eliminar al usuario
      <span class="font-semibold text-yellow-100 text-xl">{{ user.fullName }}</span>?
    </p>

    <div class="flex justify-center gap-4">
      <button
        (click)="onCancel()"
        class="px-4 py-2 bg-green-700 hover:bg-green-600 rounded-lg transition"
      >
        Cancelar
      </button>
      <button
        (click)="onConfirm()"
        class="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-lg transition"
      >
        Eliminar
      </button>
    </div>
  </div>
