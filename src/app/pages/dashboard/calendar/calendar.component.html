<div class="
    w-full
    h-full
    min-h-screen

    flex
    flex-col

    bg-white

    rounded-none
    md:rounded-3xl

    shadow-none
    md:shadow-2xl

    p-2
    sm:p-4
    md:p-6
    lg:p-8

    overflow-hidden
  ">

  <!-- HEADER -->
  <div class="
      flex
      items-center
      justify-between

      gap-2
      md:gap-4

      mb-4
      md:mb-6

      shrink-0
    ">

    <button pButton icon="pi pi-chevron-left" class="
        !w-10
        !h-10
        md:!w-12
        md:!h-12

        !rounded-full
        !border-0

        !bg-slate-100
        hover:!bg-slate-200

        transition-all
      " (click)="previousMonth()">
    </button>

    <h2 class="
        flex-1

        text-center

        text-base
        sm:text-lg
        md:text-2xl
        lg:text-3xl

        font-bold
        capitalize

        truncate

        text-slate-800
      ">
      {{ monthName() }}
    </h2>

    <button pButton icon="pi pi-chevron-right" class="
        !w-10
        !h-10
        md:!w-12
        md:!h-12

        !rounded-full
        !border-0

        !bg-slate-100
        hover:!bg-slate-200

        transition-all
      " (click)="nextMonth()">
    </button>

  </div>

  <!-- WEEKDAYS -->
  <div class="
      grid
      grid-cols-7

      gap-1
      md:gap-2

      mb-2

      shrink-0
    ">

    @for(day of weekDays; track day) {

    <div class="
          text-center

          font-bold

          text-[10px]
          sm:text-xs
          md:text-sm

          text-slate-600

          py-2

          uppercase

          tracking-wide
        ">
      {{ day }}
    </div>

    }

  </div>

  <!-- CALENDAR GRID -->
  <div class="
      flex-1

      grid
      grid-cols-7

      auto-rows-fr

      gap-1
      md:gap-2

      min-h-0
    ">

    @for(day of days(); track day.date) {

    <div (click)="selectDate(day)" [ngStyle]="getDayStyles(day)" class="
          relative

          flex
          flex-col
          justify-between

          rounded-xl
          md:rounded-2xl

          p-1
          sm:p-2
          md:p-3

          overflow-hidden

          transition-all
          duration-300

          hover:scale-[1.02]
          hover:shadow-xl

          border-2

          min-h-0
        " [class.opacity-30]="!day.currentMonth" [class.cursor-not-allowed]="day.blocked"
      [class.border-blue-500]="day.today" [class.border-transparent]="!day.today">

      <!-- TOP -->
      <div class="
            flex
            items-start
            justify-between
          ">

        <span class="
              text-[11px]
              sm:text-sm
              md:text-lg

              font-bold
            ">
          {{ day.dayNumber }}
        </span>

        @if(day.today) {

        <div class="
                w-2
                h-2

                md:w-3
                md:h-3

                rounded-full

                bg-blue-500

                animate-pulse
              "></div>

        }

      </div>

      <!-- LABELS -->
      <div class="
            flex
            flex-col
            gap-1
          ">

        @if(day.holiday) {

        <span class="
                text-[8px]
                sm:text-[10px]
                md:text-xs

                bg-white/30

                rounded-full

                px-1
                md:px-2

                py-[2px]

                w-fit

                font-semibold

                backdrop-blur-sm
              ">
          Festivo
        </span>

        }

        @if(day.blocked) {

        <span class="
                text-[8px]
                sm:text-[10px]
                md:text-xs

                bg-black/20

                rounded-full

                px-1
                md:px-2

                py-[2px]

                w-fit

                font-semibold
              ">
          Bloqueado
        </span>

        }

      </div>

    </div>

    }

  </div>

  <!-- FOOTER LEGEND -->
  <div class="
      mt-4
      md:mt-6

      flex
      flex-wrap

      items-center
      justify-center

      gap-2
      md:gap-4

      shrink-0
    ">

    <div class="flex items-center gap-2">

      <div class="w-3 h-3 md:w-4 md:h-4 rounded-full" [style.background]="colors.holiday"></div>

      <span class="text-[10px] md:text-sm">
        Festivos
      </span>

    </div>

    <div class="flex items-center gap-2">

      <div class="w-3 h-3 md:w-4 md:h-4 rounded-full" [style.background]="colors.weekend"></div>

      <span class="text-[10px] md:text-sm">
        Fin Semana
      </span>

    </div>

    <div class="flex items-center gap-2">

      <div class="w-3 h-3 md:w-4 md:h-4 rounded-full" [style.background]="colors.workday"></div>

      <span class="text-[10px] md:text-sm">
        Laboral
      </span>

    </div>

  </div>

</div>
