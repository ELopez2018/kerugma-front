<div class="min-h-screen flex flex-col bg-gradient-to-br from-green-900 via-green-700 to-white text-green-900">

  <!-- Menú superior (usuarios) -->
  <header class="w-full h-16 bg-green-800 text-white flex items-center justify-between px-6 shadow-md">
    <div class="text-xl font-bold ">
      <svg class=" hover:cursor-pointer md:hidden" (click)="toggleMenu = true" width="40px" height="40px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M4 6H20M4 12H20M4 18H20" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
    </div>
    <div class="flex gap-4 items-center">
      <span>
        <svg width="40px" height="40px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M16 7C16 9.20914 14.2091 11 12 11C9.79086 11 8 9.20914 8 7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7Z" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> <path d="M12 14C8.13401 14 5 17.134 5 21H19C19 17.134 15.866 14 12 14Z" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
      </span>
      <!-- <button class="bg-white text-green-800 font-semibold px-3 py-1 rounded hover:bg-green-100 transition">Cerrar sesión</button> -->
    </div>
  </header>

  <!-- Contenido inferior -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Menú administrativo lateral -->
    <aside [class.w-64]="!collapsed" [class.w-16]="collapsed"
      class=" relative hidden md:block bg-green-900 text-white transition-all duration-300 overflow-hidden ">

      <button (click)="collapsed = !collapsed"
        class="absolute top-4 right-2 text-white focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6"
          fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path [attr.d]="collapsed
            ? 'M15 19l-7-7 7-7'
            : 'M9 5l7 7-7 7'"
            stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
          </svg>
        </button>
        <nav class="mt-16  px-4" >
          @for (item of menu; track item) {
            <div>
              @if (!collapsed) {
                <a href="#" [routerLink]="item.data" class="block text-xl py-2 px-2 rounded hover:bg-green-700 transition" > <span class="pi {{item.icon}} "></span> {{ item.label }}</a>
              }
            </div>
          }
        </nav>
        @if (!collapsed) {
          <div  class=" w-[90%] py-2 mx-2 px-4 block text-xl absolute bottom-10 rounded hover:bg-green-700 transition hover:cursor-pointer" (click)="logOut()"> <span class="pi pi-sign-out"></span> Cerrar Sesion</div>
        }
      </aside>

      <!-- Contenido principal -->
      <main class="flex-1 p-6 bg-white overflow-auto transition-all duration-300">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>

  @if (toggleMenu) {

      class="absolute menu-mobile h-[100vh] w-[100vw] top-0 left-0 z-10 bg-green-900 text-white xl:hidden"

      </span></div>
      <p-tree
        [value]="menu"
        selectionMode="single"
        styleClass="w-full md:w-[30rem]"
        (onNodeSelect)="onMenuSelect($event)"
        />

        <div class="hover:border hover:border-white ps-8 p-1 mb-1 ms-3 rounded"><a href="">CARRITO</a></div>
        <div class="hover:border hover:border-white ps-8 p-1 mb-1 ms-3 rounded"><a href="">FAVORITOS</a></div>
        <div class="hover:border hover:border-white ps-8 p-1 mb-1 ms-3 rounded"><a href="">ATENCION AL CLIENTE</a></div>
        <div class="hover:border hover:border-white ps-8 p-1 mb-1 ms-3 rounded"><a href="">LOCALIZA TU TIENDA</a></div> -->
      </div>
    }
    <p-toast />
