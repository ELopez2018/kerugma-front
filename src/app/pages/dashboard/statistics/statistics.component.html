<h1 class="text-center text-2xl py-4">ESTADISTICAS DE LA PREDICACION PUBLICA</h1>
<div class="p-4 sm:p-6 bg-green-950 rounded-2xl shadow-md w-full max-w-7xl mx-auto h-auto">
  <h2 class="text-center text-green-100 text-xl font-semibold mb-6">ESTADÍSTICAS DE LA PREDICACIÓN PÚBLICA</h2>
  <div #container class="grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-4">
    @for (stat of stats; track stat) {
      <div class="flex flex-col items-center justify-center bg-green-900 p-6 rounded-xl shadow-md hover:scale-105 transition-transform duration-300">
        <div class="text-3xl font-bold text-green-300">{{ stat.value }}</div>
        <div class="text-sm text-green-100 mt-2 text-center">{{ stat.title }}</div>
      </div>
    }
  </div>
</div>
